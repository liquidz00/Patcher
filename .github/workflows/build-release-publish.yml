name: Build, Release and Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      contributors:
        description: 'Contributors for this release'
        required: false
        default: ''

permissions:
  contents: write
  id-token: write

jobs:
  build-and-release:
    name: Build, Release, and Publish to PyPI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Read release version
        id: read_version
        run: |
          VERSION=$(uv run python -c 'import src.patcher.__about__ as about; print(about.__version__)')
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Build binary wheel and source tarball
        run: uv build

      - name: Store distribution package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: patcher-${{ env.VERSION }}
          path: dist/

      - name: Publish package to PyPI
        id: publish_pypi
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0

      - name: Get Changelog updates
        id: changelog_reader
        uses: mindsers/changelog-reader-action@1faaf50aa09d5793d9a100819973df801febfb31  # v2.4.0
        with:
          validation_depth: 100
          version: v${{ env.VERSION }}

      - name: Generate changelog
        id: changelog
        uses: metcalfc/changelog-generator@0440d0932f9a0dd1cc9ecd8412830761351323bd  # v4.7.0
        continue-on-error: true  # don't block releases
        with:
          myToken: ${{ secrets.GITHUB_TOKEN }}
          reverse: 'true'

      - name: Create Release
        id: create_release
        if: ${{ steps.publish_pypi.outcome == 'success' }}
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          name: Patcher ${{ env.VERSION }}
          tag_name: v${{ env.VERSION }}
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            ./dist/*.tar.gz
            ./dist/*.whl
          body: |
            # Patcher Release Notes
            This release has been automatically generated by a GitHub Action.
            For detailed installation instructions, please refer to the [Docs](https://docs.patcherctl.dev) or the [README](https://github.com/liquidz00/Patcher/blob/main/README.md)

            ## Changelog for this release
            This amended changelog is specific to this release. View the [full changelog](https://github.com/liquidz00/Patcher/blob/main/CHANGELOG.md) for all details.
            ${{ steps.changelog_reader.outputs.changes }}

            ## Changes
            ${{ steps.changelog.outputs.changelog }}

            ### Contributors
            ${{ github.event.inputs.contributors }}
