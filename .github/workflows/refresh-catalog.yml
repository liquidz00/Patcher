name: Refresh Catalog

# Runs the full catalog pipeline (ingest from all five sources, stitch into
# unified apps rows) on a GH-hosted runner and uploads the resulting DB to
# the live API via POST /admin/catalog/upload. The systemd.path watcher on
# Linode picks up the new file and triggers the swap script.
#
# Triggers:
#   - schedule: daily at 04:00 UTC (mid-evening US, mid-morning EU)
#   - workflow_dispatch: manual button for immediate refreshes
#
# Secret required: PATCHER_DEPLOY_TOKEN (minted via grant_deploy_token.py
# on Linode). Set under Settings → Secrets and variables → Actions.

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions: read-all

# Don't run overlapping refreshes. A long ingest plus a manually-triggered
# one shouldn't stomp each other. New runs queue behind in-progress ones.
concurrency:
  group: refresh-catalog
  cancel-in-progress: false

jobs:
  refresh:
    name: Build + upload catalog
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: make dev

      # Linux needs the null keyring backend or patcherctl's transitive
      # keyring import fails on the runner.
      - name: Configure keyring backend
        run: echo "KEYRING_BACKEND=keyring.backends.null.Keyring" >> $GITHUB_ENV

      - name: Run full ingest + stitch pipeline
        working-directory: api
        env:
          PATCHER_API_RESOLVE_INGEST: "true"
        run: uv run python scripts/ingest.py all

      # Save the built DB as a workflow artifact for ~7 days. Useful for
      # diagnosing "the upload looked weird, what was actually in it?"
      # without having to re-run the full ingest pipeline.
      - name: Upload DB as workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: patcher_api.db
          path: api/patcher_api.db
          retention-days: 7

      - name: Upload catalog to live API
        env:
          DEPLOY_TOKEN: ${{ secrets.PATCHER_DEPLOY_TOKEN }}
        run: |
          set -euo pipefail
          DB=api/patcher_api.db
          SHA=$(sha256sum "$DB" | awk '{print $1}')
          BYTES=$(wc -c < "$DB")
          echo "Uploading ${BYTES} bytes (sha256=${SHA})..."
          curl -fsS -X POST \
            -H "Authorization: Bearer ${DEPLOY_TOKEN}" \
            -H "Content-Type: application/octet-stream" \
            -H "X-Catalog-SHA256: ${SHA}" \
            --data-binary "@${DB}" \
            https://api.patcherctl.dev/admin/catalog/upload
          echo
